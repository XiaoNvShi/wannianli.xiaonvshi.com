    async function load(ymd){

      if(cached){state.data=cached;state.hourIndex=findHourIndex();setStatus('已更新','ok');renderAll();schedulePrefetch(ymd);return}
      loading(true);

      if(state.controller) state.controller.abort();

      const timer=setTimeout(()=>state.controller.abort(),12000);
      try{
        const res=await fetch(url,{cache:'force-cache',signal:state.controller.signal});
        const raw=await res.text();
        if(!res.ok) throw new Error('数据加载失败，请稍后重试。');

        if(!json||!json.data) throw new Error('暂无数据。');
        if(json.code&&String(json.code)!=='200') throw new Error('数据加载失败，请稍后重试。');

      els.goodGods.innerHTML=tagHtml(good,'good');els.badGods.innerHTML=tagHtml(bad,'bad');
    }
    function findHourIndex(){const hs=tyme().hours||[];const i=hs.findIndex(h=>h?.selected);if(i>=0)return i;const h=Number(tyme().request?.hour);const hour=Number.isFinite(h)?h:new Date().getHours();if(hour===23)return 0;return Math.max(0,Math.min(11,Math.floor((hour+1)/2)))}
    function hourTextHtml(items,kind){
      const text=uniq(arr(items).map(x=>asText(x,'')).filter(x=>!isBlankText(x))).join('、');
      if(!text)return '';
      return `<div class="hourText ${kind||''}" title="${esc(text)}">${esc(text)}</div>`;
    }
    function renderHours(){
      const hs=tyme().hours||[];if(!hs.length){els.hourRows.innerHTML='';els.hourDetail.innerHTML='';return}
      if(state.hourIndex===null)state.hourIndex=findHourIndex();
      els.hourRows.innerHTML=hs.map((h,i)=>{const sel=i===state.hourIndex,e=h.twelve_star?.ecliptic,tab=h.taboo||{},luck=asText(e?.luck||h.luck,'');return `<tr class="${sel?'active':''}" data-hour="${i}"><td data-label="时辰"><div class="hourCell">${esc(asText(h.name||h.text,`第${i+1}时`))}</div></td><td data-label="时间">${esc(asText(h.range||h.time_range||h.time,''))}</td><td data-label="时柱">${esc(asText(h.hour||h.sixty_cycle||h.text,''))}</td><td data-label="黄黑道">${esc(e?`${asText(e)} · ${luck}`:asText(h.twelve_star||h.ecliptic,''))}</td><td data-label="九星">${esc(uniq([asText(h.nine_star,''),asText(h.minor_ren,'')]).join(' · '))}</td><td data-label="时宜">${hourTextHtml(tab.recommends_text||tab.recommends||h.recommends||h.yi,'goodText')}</td><td data-label="时忌">${hourTextHtml(tab.avoids_text||tab.avoids||h.avoids||h.ji,'badText')}</td></tr>`}).join('');
      renderHourDetail();
    }
    function renderHourDetail(){
      const h=(tyme().hours||[])[state.hourIndex];if(!h){els.hourDetail.innerHTML='';return}const e=h.twelve_star?.ecliptic,tab=h.taboo||{};
      els.hourDetail.innerHTML=`<div class="mini"><h4>${esc(asText(h.name||h.text,''))} · ${esc(asText(h.range||h.time_range||h.time,''))}</h4><div class="infoGrid">${infoRows([['时辰',h.text],['时柱',h.hour||h.sixty_cycle],['纳音',h.hour?.sound],['黄黑道',e?`${asText(e)} · ${asText(e.luck)}`:h.twelve_star],['九星',h.nine_star],['小六壬',h.minor_ren],['时宜',arr(tab.recommends_text||tab.recommends||h.recommends||h.yi).join('、')],['时忌',arr(tab.avoids_text||tab.avoids||h.avoids||h.ji).join('、')]])}</div></div>`;
    }
    function historyName(t){return Number(t)===2?'出生':Number(t)===3?'逝世':'事件'}
    function renderHistory(){
      let rows=root().lishi||root().history||[];
      if(state.historyType!=='all')rows=rows.filter(x=>String(x.type)===String(state.historyType));
      const q=state.historySearch.trim().toLowerCase();if(q)rows=rows.filter(x=>`${x.year||''} ${x.month||''} ${x.day||''} ${x.data||x.text||''}`.toLowerCase().includes(q));
      els.historySub.textContent=`${rows.length} 条记录`;els.historyList.innerHTML=rows.length?rows.map(x=>`<article class="hist"><div class="histYear">${esc(x.year||'')}</div><div><span class="badge t${esc(x.type||'')}">${historyName(x.type)}</span></div><div>${esc(x.data||x.text||'')}</div></article>`).join(''):'<span class="empty">暂无记录</span>';
    }
    function shiftDay(offset){const {year,month,day}=parseYmd(state.ymd);const date=new Date(year,month-1,day+offset);load(fmtDate(date))}
    function shiftMonth(offset){const {year,month,day}=parseYmd(state.ymd);const date=new Date(year,month-1+offset,1);const last=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();date.setDate(Math.min(day,last));load(fmtDate(date))}
    function bind(){
      els.goBtn.addEventListener('click',()=>els.dateInput.value&&load(els.dateInput.value));
      els.dateInput.addEventListener('change',()=>els.dateInput.value&&load(els.dateInput.value));
      els.prevDay.addEventListener('click',()=>shiftDay(-1));els.nextDay.addEventListener('click',()=>shiftDay(1));els.todayBtn.addEventListener('click',()=>load(todayYmd()));
      els.prevMonth.addEventListener('click',()=>shiftMonth(-1));els.nextMonth.addEventListener('click',()=>shiftMonth(1));
      els.days.addEventListener('click',e=>{const btn=e.target.closest('[data-ymd]');if(btn&&btn.dataset.ymd)load(btn.dataset.ymd)});
      els.hourRows.addEventListener('click',e=>{const tr=e.target.closest('[data-hour]');if(!tr)return;state.hourIndex=Number(tr.dataset.hour);renderHours()});
      els.historySearch.addEventListener('input',e=>{state.historySearch=e.target.value;renderHistory()});
      els.historyType.addEventListener('change',e=>{state.historyType=e.target.value;renderHistory()});
      els.copyBtn.addEventListener('click',async()=>{const txt=`${els.heroTitle.textContent}\n${els.overviewSub.textContent}`;try{await navigator.clipboard.writeText(txt);setStatus('已复制','ok');setTimeout(()=>setStatus('已更新','ok'),1200)}catch(e){setStatus('复制失败','err')}});
      els.shareBtn.addEventListener('click',async()=>{try{if(navigator.share)await navigator.share({title:document.title,text:els.heroTitle.textContent,url:location.href});else{await navigator.clipboard.writeText(location.href);setStatus('链接已复制','ok');setTimeout(()=>setStatus('已更新','ok'),1200)}}catch(e){}});
      document.addEventListener('keydown',e=>{if(e.target&&/input|select/i.test(e.target.tagName))return;if(e.key==='ArrowLeft')shiftDay(-1);if(e.key==='ArrowRight')shiftDay(1)})
    }
    bind();renderEmpty();load(state.ymd);
  })();
  </script>
</body>
</html>
